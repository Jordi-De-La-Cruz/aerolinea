<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inicia sesión en Destinos Mundiales" />
    <title>Iniciar Sesión - Destinos Mundiales</title>

    <!-- Preload crítico -->
    <link rel="preload" href="img/mundo.png" as="image" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/login.css" />

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>

<body>
    <div class="login-page">
        <!-- Botón de regreso -->
        <button class="back-btn" onclick="window.history.back()" aria-label="Volver atrás">
            <i class="fas fa-arrow-left" aria-hidden="true"></i>
        </button>

        <div class="login-container fade-in">
            <div class="login-header">
                <div class="login-logo slide-in">
                    <img src="img/mundo.png" alt="Logo Destinos Mundiales" />
                    <h1>Destinos Mundiales</h1>
                </div>
                <p class="login-subtitle">Inicia sesión para continuar tu aventura</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <input type="email" id="email" class="form-input" placeholder="Correo electrónico" required
                        autocomplete="email" aria-label="Correo electrónico" aria-describedby="email-error" />
                    <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
                </div>

                <div class="form-group">
                    <input type="password" id="password" class="form-input" placeholder="Contraseña" required
                        autocomplete="current-password" aria-label="Contraseña" aria-describedby="password-error" />
                    <i class="fas fa-lock input-icon" aria-hidden="true"></i>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember" />
                        <label for="remember">Recordarme</label>
                    </div>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
                    Iniciar Sesión
                </button>
            </form>

            <div class="divider">
                <span>O continúa con</span>
            </div>

            <div class="social-login">
                <button class="btn-social google" aria-label="Iniciar sesión con Google">
                    <i class="fab fa-google" aria-hidden="true"></i>
                </button>
                <button class="btn-social facebook" aria-label="Iniciar sesión con Facebook">
                    <i class="fab fa-facebook-f" aria-hidden="true"></i>
                </button>
                <button class="btn-social twitter" aria-label="Iniciar sesión con Twitter">
                    <i class="fab fa-twitter" aria-hidden="true"></i>
                </button>
            </div>

            <div class="signup-link">
                <p>¿No tienes una cuenta?</p>
                <a href="#">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
